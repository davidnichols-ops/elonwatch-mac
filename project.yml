name: ElonWatch
options:
  bundleIdPrefix: com.elonwatch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.elonwatch.futuresync
    PRODUCT_NAME: ElonWatch
    MARKETING_VERSION: "2.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Sources/ElonWatch/Info.plist
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

targets:
  ElonWatch:
    type: application
    platform: macOS
    sources:
      - path: Sources/ElonWatch
        excludes:
          - Resources/**
    resources:
      - path: Sources/ElonWatch/Assets.xcassets
      - path: Sources/ElonWatch/Resources/elonwatch_scraper
        buildPhase: resources
      - path: Sources/ElonWatch/Resources/intro.mp4
        buildPhase: resources
      - path: Sources/ElonWatch/Resources/icon.png
        buildPhase: resources
    entitlements:
      path: Sources/ElonWatch/ElonWatch.entitlements
